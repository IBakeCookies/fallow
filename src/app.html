<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%" class="%theme%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />

		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/favicon.ico" sizes="32x32" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<meta name="theme-color" content="#f0f2f5" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#15151d" media="(prefers-color-scheme: dark)" />

		<!-- no-FOUC: first visit (no theme cookie) on a dark-preferring OS gets
		     the dark default before first paint instead of a light flash -->
		<script>
			if (
				!document.cookie.includes('theme=') &&
				matchMedia('(prefers-color-scheme: dark)').matches
			) {
				document.documentElement.className = 'dark';
			}
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover" class="min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
