<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%" class="%theme%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />

		<!-- no-FOUC: first visit (no theme cookie) on a dark-preferring OS gets
		     the dark default before first paint instead of a light flash -->
		<script>
			if (
				!document.cookie.includes('theme=') &&
				matchMedia('(prefers-color-scheme: dark)').matches
			) {
				document.documentElement.className = 'solid solid-dark dark';
			}
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover" class="min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
