name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # chromium for vitest browser mode + playwright e2e (webServer builds the app)
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - run: npx eslint .
      - run: npm run test:unit -- --run
      - run: npm run test:e2e
